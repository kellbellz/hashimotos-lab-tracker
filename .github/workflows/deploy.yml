name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
      - claude/home-affordability-repair-calc-ggqjqe
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs for the same ref
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Base path must match the repo name so assets resolve on the project site
      - run: npx vite build --base=/${{ github.event.repository.name }}/

      - uses: actions/configure-pages@v5
        with:
          # Auto-create the Pages site (source = GitHub Actions) if not already enabled
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
